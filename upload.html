<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCB DXF 上傳工具</title>
  <style>
<style>
  .form-card {
    margin-top: 28px;
    padding: 28px;
    border-radius: 18px;
    background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%);
    border: 1px solid #e5e7eb;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }

  .form-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 24px;
    font-weight: 700;
    color: #111827;
  }

  .form-title-badge {
    padding: 4px 10px;
    border-radius: 999px;
    background: #dbeafe;
    color: #1d4ed8;
    font-size: 13px;
    font-weight: 600;
  }

  .form-subtitle {
    margin-bottom: 24px;
    color: #6b7280;
    font-size: 14px;
    line-height: 1.6;
  }

  .section-block {
    margin-top: 22px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    color: #374151;
    font-weight: 700;
    font-size: 16px;
  }

  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #2563eb;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px 20px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .form-field label {
    font-size: 14px;
    font-weight: 600;
    color: #374151;
  }

  .form-field input,
  .form-field select {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 13px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #111827;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .form-field input:focus,
  .form-field select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    background: #fff;
  }

  .form-hint {
    color: #9ca3af;
    font-size: 12px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  .process-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .process-card {
    padding: 14px;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    background: #ffffff;
  }

  .process-card label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #374151;
  }

  .process-card select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    font-size: 14px;
  }

  .form-note {
    margin-top: 22px;
    padding: 14px 16px;
    border-radius: 14px;
    background: #eff6ff;
    color: #1e40af;
    font-size: 14px;
    line-height: 1.7;
    border: 1px solid #bfdbfe;
  }

  @media (max-width: 720px) {
    .form-grid,
    .process-grid {
      grid-template-columns: 1fr;
    }

    .form-card {
      padding: 22px;
    }
  }
</style>
  </style>
</head>
<body>
  <div class="container">
    <h1>PCB DXF 上傳工具</h1>

    <div class="desc">
      請先在此上傳 PCB 單板 DXF 檔。<br />
      上傳成功後，系統會產生一組 <code>object_key</code>。<br />
      請把 <code>object_key</code> 複製到 Dify 的 PCB 連版規劃 GenAI 表單中使用。
    </div>

    <div class="upload-box">
      <div>請選擇 .dxf 檔案</div>
      <input id="fileInput" type="file" accept=".dxf" />
      <br />
      <button id="uploadBtn" onclick="uploadFile()">上傳 DXF</button>
      <div id="status" class="status"></div>
    </div>

    <div id="resultBox" class="result">
      <h2>上傳成功</h2>

      <div class="field">
        <div class="label">檔案名稱</div>
        <div id="filename"></div>
      </div>

      <div class="field">
        <div class="label">檔案大小</div>
        <div id="filesize"></div>
      </div>

      <div class="field">
        <div class="label">object_key，請複製到 Dify</div>
        <div class="copy-row">
          <input id="objectKeyInput" class="copy-input" readonly />
          <button class="small-btn" onclick="copyObjectKey()">複製</button>
        </div>
      </div>

      <div class="field">
        <div class="label">file_id</div>
        <div id="fileId"></div>
      </div>

      <div class="note">
        下一步：打開 Dify 的 PCB DXF 連版規劃 GenAI，將上方 object_key 貼到 <code>object_key</code> 欄位。
      </div>
    </div>

    <div id="errorBox" class="error"></div>
  </div>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const status = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");
      const errorBox = document.getElementById("errorBox");

      resultBox.style.display = "none";
      errorBox.style.display = "none";
      errorBox.innerText = "";

      if (!fileInput.files || fileInput.files.length === 0) {
        errorBox.style.display = "block";
        errorBox.innerText = "請先選擇 DXF 檔案。";
        return;
      }

      const file = fileInput.files[0];

      if (!file.name.toLowerCase().endsWith(".dxf")) {
        errorBox.style.display = "block";
        errorBox.innerText = "只允許上傳 .dxf 檔案。";
        return;
      }

      const formData = new FormData();
      formData.append("dxf_file", file);

      uploadBtn.disabled = true;
      status.innerText = "上傳中，請稍候...";

      try {
        const response = await fetch("/api/pcb/upload-dxf-to-minio", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "上傳失敗");
        }

        document.getElementById("filename").innerText = data.filename || "";
        document.getElementById("filesize").innerText = formatBytes(data.file_size_bytes || 0);
        document.getElementById("objectKeyInput").value = data.object_key || "";
        document.getElementById("fileId").innerText = data.file_id || "";

        resultBox.style.display = "block";
        status.innerText = "上傳完成。";
      } catch (error) {
        errorBox.style.display = "block";
        errorBox.innerText = "上傳失敗：" + error.message;
        status.innerText = "";
      } finally {
        uploadBtn.disabled = false;
      }
    }

    function copyObjectKey() {
      const input = document.getElementById("objectKeyInput");
      input.select();
      input.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(input.value);
      alert("object_key 已複製。");
    }

    function formatBytes(bytes) {
      if (bytes === 0) return "0 Bytes";
      const k = 1024;
      const sizes = ["Bytes", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
    }
    <div class="form-card">
  <div class="form-title">
    PCB 連版條件
    <span class="form-title-badge">Panelization Input</span>
  </div>

  <div class="form-subtitle">
    請輸入單板尺寸、設備限制與製程條件。系統會根據這些資料與公司連板規範，產生連版建議與輸出 DXF。
  </div>

  <div class="section-block">
    <div class="section-header">
      <span class="section-dot"></span>
      產品與單板基本資料
    </div>

    <div class="form-grid">
      <div class="form-field full-width">
        <label for="productName">產品名稱</label>
        <input id="productName" value="TEST-PCB-001" placeholder="例如：ABC-001" />
        <div class="form-hint">此名稱會用於報告與輸出 DXF 檔名。</div>
      </div>

      <div class="form-field">
        <label for="singleBoardLength">單板長度 mm</label>
        <input id="singleBoardLength" type="number" value="120" min="1" step="0.1" />
      </div>

      <div class="form-field">
        <label for="singleBoardWidth">單板寬度 mm</label>
        <input id="singleBoardWidth" type="number" value="80" min="1" step="0.1" />
      </div>

      <div class="form-field">
        <label for="railWidth">工藝邊 mm</label>
        <input id="railWidth" type="number" value="5" min="0" step="0.1" />
        <div class="form-hint">建議初始值 5 mm，正式值請依公司規範確認。</div>
      </div>
    </div>
  </div>

  <div class="section-block">
    <div class="section-header">
      <span class="section-dot"></span>
      設備限制
    </div>

    <div class="form-grid">
      <div class="form-field">
        <label for="smtMaxLength">SMT 最大長度 mm</label>
        <input id="smtMaxLength" type="number" value="330" min="1" step="0.1" />
      </div>

      <div class="form-field">
        <label for="smtMaxWidth">SMT 最大寬度 mm</label>
        <input id="smtMaxWidth" type="number" value="250" min="1" step="0.1" />
      </div>

      <div class="form-field">
        <label for="ictMaxLength">ICT 最大長度 mm</label>
        <input id="ictMaxLength" type="number" value="350" min="1" step="0.1" />
      </div>

      <div class="form-field">
        <label for="ictMaxWidth">ICT 最大寬度 mm</label>
        <input id="ictMaxWidth" type="number" value="300" min="1" step="0.1" />
      </div>
    </div>
  </div>

  <div class="section-block">
    <div class="section-header">
      <span class="section-dot"></span>
      製程與風險條件
    </div>

    <div class="process-grid">
      <div class="process-card">
        <label for="hasBgaQfn">BGA / QFN</label>
        <select id="hasBgaQfn">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>

      <div class="process-card">
        <label for="hasDip">DIP</label>
        <select id="hasDip">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>

      <div class="process-card">
        <label for="hasHeavyComponent">重零件</label>
        <select id="hasHeavyComponent">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>

      <div class="process-card">
        <label for="isIrregularShape">異形板</label>
        <select id="isIrregularShape">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-note">
    提醒：本工具產出的 DXF 為 AI 建議版，正式投產前仍需 ME / CAM 工程師確認 V-cut、Router、Fiducial、Tooling Hole 與分板應力。
  </div>
</div>
  </script>


</body>
</html>
